name: Tesla Trip Monitor
on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:        # manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: tesla-state-${{ github.run_id }}
          restore-keys: |
            tesla-state-

      - name: Restore tokens cache
        uses: actions/cache@v4
        with:
          path: tokens.json
          key: tesla-tokens-${{ github.run_id }}
          restore-keys: |
            tesla-tokens-

      - name: Write initial tokens (first run only)
        env:
          TESLA_TOKENS: ${{ secrets.TESLA_TOKENS }}
        run: |
          if [ ! -f tokens.json ]; then
            echo "$TESLA_TOKENS" > tokens.json
          fi

      - name: Run monitor (4.5 min loop, 60s intervals)
        env:
          TESLA_CLIENT_ID: ${{ secrets.TESLA_CLIENT_ID }}
          TESLA_CLIENT_SECRET: ${{ secrets.TESLA_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --loop
