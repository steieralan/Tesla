name: Tesla Trip Monitor
on:
  schedule:
    # Active hours: ~6am–11pm Eastern (during EDT)
    # 10:00–02:55 UTC covers EDT 06:00–22:55 ET
    - cron: '*/5 10-23 * * *'
    - cron: '*/5 0-2 * * *'
  workflow_dispatch:        # manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: tesla-state-${{ github.run_id }}
          restore-keys: |
            tesla-state-

      - name: Restore tokens cache
        uses: actions/cache@v4
        with:
          path: tokens.json
          key: tesla-tokens-v2-${{ github.run_id }}
          restore-keys: |
            tesla-tokens-v2-

      - name: Write initial tokens (first run only)
        env:
          TESLA_TOKENS: ${{ secrets.TESLA_TOKENS }}
        run: |
          if [ ! -f tokens.json ]; then
            echo "$TESLA_TOKENS" > tokens.json
          fi

      - name: Run monitor (4 min loop, 120s intervals = 2 polls per run)
        env:
          TESLA_CLIENT_ID: ${{ secrets.TESLA_CLIENT_ID }}
          TESLA_CLIENT_SECRET: ${{ secrets.TESLA_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --loop
