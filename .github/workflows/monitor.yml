name: Tesla Trip Monitor
on:
  # Scheduled triggers are handled externally by cron-job.org via the
  # workflow_dispatch API (see https://cron-job.org → Tesla cronjob).
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: tesla-state-${{ github.run_id }}
          restore-keys: |
            tesla-state-

      - name: Write fresh tokens from secret
        env:
          TESLA_TOKENS: ${{ secrets.TESLA_TOKENS }}
        run: echo "$TESLA_TOKENS" > tokens.json

      - name: Run monitor (4 min loop, 120s intervals = 2 polls per run)
        env:
          TESLA_CLIENT_ID: ${{ secrets.TESLA_CLIENT_ID }}
          TESLA_CLIENT_SECRET: ${{ secrets.TESLA_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --loop
